apiVersion: tekton.dev/v1beta1
kind: Task
metadata:
  name: frontend-security-scan-task
spec:
  description: This Task can be used to perform fortify and nexus scan for frontend
  params:
    - description: repository name
      name: repo-name
      type: string
    - description: fortify project name
      name: fortify-project-name
      type: string
    - name: frontend-project-name
      description: frontend project name
      type: string
    - name: nexus-iq-project-name
      description: nexus iq project name
      type: string
  steps:
    - image: image-registry.openshift-image-registry.svc:5000/easd-agwa-pipeline/security-scanner:latest
      name: security-scan
      resources:
        limits:
          cpu: '10'
          memory: 40Gi
        requests:
          cpu: '1'
          memory: 1Gi
      workingDir: $(workspaces.source.path)/security
      env:
        - name: FORTIFY_TOKEN
          valueFrom:
            secretKeyRef:
              name: fortify-secret
              key: fortify-token
        - name: NEXUS_CREDENTIALS
          valueFrom:
            secretKeyRef:
              name: nexus-secret
              key: nexus-credentials
      script: |
        #!/usr/bin/env sh

        # ###########################################################################
        # Script generated by Fortify Scan Wizard (c) 2011-2024 Open Text
        # Created on 2024/10/31 11:07:58
        # ###########################################################################
        # Generated for the following languages:
        # 	HTML
        # 	JavaScript / TypeScript
        # ###########################################################################
        # FPR - the name of analysis results file
        # DEBUG - if set to true, runs SCA in debug mode
        # SOURCEANALYZER - the name of the SCA executable
        # BUILDID - the SCA build ID
        # ARGFILE - the name of the argument file that's passed to SCA
        # BYTECODE_ARGFILE - the name of the argument file for Java bytecode translation in the SCA
        # MEMORY - the memory settings for SCA
        # SCANSWITCHES - parameters to pass in the SCA analysis phase
        # LAUNCHERSWITCHES - the launcher settings that are used to invoke SCA
        # CLIENT - the name of the fortifyclient executable
        # SSCURL - the SSC url for uploading the FPR
        # SSCAPPLICATION - the name of the application to upload the FPR to
        # SSCVERSION - the name of the application version to upload the FPR to
        # SSCTOKEN - the token for authenticating the FPR upload
        # OLDFILENUMBER - this defines the file that contains the number of files within the project, it is automatically generated
        # FILENOMAXDIFF - this is the percentage of difference between the number of files which will trigger a warning by the script
        # ###########################################################################
        
        DEBUG=true
        SOURCEANALYZER=sourceanalyzer
        FPR="$(params.repo-name).fpr"
        SSCURL=https://ex91yfrtscc.enp.aramco.com.sa:8443/ssc
        SSCAPPLICATION="$(params.fortify-project-name)"
        SSCVERSION="DEV"
        SSCTOKEN=${FORTIFY_TOKEN}
        CLIENT=fortifyclient
        BUILDID="pipeline"
        ARGFILE="fortify-scan-linux.sh.args"
        BYTECODE_ARGFILE="fortify-scan-linux.sh.bytecode.args"
        MEMORY="-Xmx35204M -Xms4000M -Xss1024M "

        LAUNCHERSWITCHES=" -verbose "
        SCANSWITCHES=""
        OLDFILENUMBER="fortify-scan-linux.sh.fileno"
        FILENOMAXDIFF=10
        ENABLE_BYTECODE=false

        PROJECTROOT0="$(workspaces.source.path)"

        NEXUSIQURL=https://ost1v.enp.aramco.com.sa:8070
        NEXUSTOKEN=${NEXUS_CREDENTIALS}
        NEXUSPROJECT="$(params.nexus-iq-project-name)"
        FRONTENDPROJECT="$(params.frontend-project-name)"
        NEXUSFILES="${PROJECTROOT0}/dist/${FRONTENDPROJECT}/*.js ${PROJECTROOT0}/package.json ${PROJECTROOT0}/package-lock.json"

        echo  "Starting Nexus IQ Scan"
        nexus-iq-cli -i $NEXUSPROJECT -s $NEXUSIQURL -t release $NEXUSFILES -Djava.net.useSystemProxies=false --ssl-trust-store-path $JAVA_HOME/lib/security/cacerts -a $NEXUSTOKEN
        echo  "Completed Nexus IQ Scan"

        if [ ! -d "$PROJECTROOT0" ]; then
          echo  "ERROR: This script is being run on a different machine than it was"
          echo  "       generated on or the targeted project has been moved. This script is "
          echo  "       configured to locate files at"
          echo  "          $PROJECTROOT0"
          echo  "       Please modify the \$PROJECTROOT0 variable found"
          echo  "       at the top of this script to point to the corresponding directory"
          echo  "       located on this machine."
          exit
        fi

        if [ $DEBUG = true ]; then export LAUNCHERSWITCHES="-debug $LAUNCHERSWITCHES"; fi
        echo Extracting Arguments File


        grep "# ARGS" $0 | grep -v grep | cut -d" " -f3- | sed -e s#PROJECTROOT0_MARKER#"$PROJECTROOT0"#g > $ARGFILE

        grep "# BYTECODE_ARGS" $0 | grep -v grep | cut -d" " -f3- | sed -e s#PROJECTROOT0_MARKER#"$PROJECTROOT0"#g  > $BYTECODE_ARGFILE

        if [ -s $BYTECODE_ARGFILE ]; then
        ENABLE_BYTECODE=true
        fi
        echo "Printing args start"
        cat $ARGFILE
        echo "Printing args ends"
        # ###########################################################################

        set SCANSWITCHES=-Dcom.fortify.sca.Phase0HigherOrder.Languages=javascript,typescript %SCANSWITCHES%

        # ###########################################################################
        echo Cleaning previous scan artifacts
        $SOURCEANALYZER $MEMORY $LAUNCHERSWITCHES -b $BUILDID -clean 
        if [ $? -ne 0 ] ; then
        echo sourceanalyzer failed, exiting
        exit
        fi

        # ###########################################################################
        echo Translating files        
        $SOURCEANALYZER $MEMORY $LAUNCHERSWITCHES -b $BUILDID  @$ARGFILE
        
        if [ $? -ne 0 ] ; then

        echo sourceanalyzer failed, exiting
        exit
        fi
        # ###########################################################################
        if [ $ENABLE_BYTECODE = true ]; then
        echo Translating Java bytecode files
        $SOURCEANALYZER $MEMORY $LAUNCHERSWITCHES -b $BUILDID @$BYTECODE_ARGFILE
        if [ $? -ne 0 ] ; then
        echo sourceanalyzer failed, exiting
        exit
        fi
        fi
        # ###########################################################################
        echo Testing Difference between Translations
        FILENUMBER=`$SOURCEANALYZER -b $BUILDID -show-files | wc -l`

        if [ ! -f $OLDFILENUMBER ]; then
          echo It appears to be the first time running this script, setting $OLDFILENUMBER to $FILENUMBER
          echo $FILENUMBER > $OLDFILENUMBER
        else
          OLDFILENO=`cat $OLDFILENUMBER`
          DIFF=`expr $OLDFILENO "*" $FILENOMAXDIFF`
          DIFF=`expr $DIFF /  100`

          MAX=`expr $OLDFILENO + $DIFF`
          MIN=`expr $OLDFILENO - $DIFF`

          if [ $FILENUMBER -lt $MIN ] ; then SHOWWARNING=true; fi
          if [ $FILENUMBER -gt $MAX ] ; then SHOWWARNING=true; fi

          if [ -n "$SHOWWARNING" ] && [ "$SHOWWARNING" = true ] ; then
            echo "WARNING: The number of files has changed by over $FILENOMAXDIFF%, it is recommended"
            echo "         that this script is regenerated with the ScanWizard"
          fi

          echo $MAX $MIN $DIFF
        fi;

        # ###########################################################################
        echo Starting scan
        $SOURCEANALYZER $MEMORY $LAUNCHERSWITCHES -b $BUILDID $SCANSWITCHES -scan -f $FPR 
        if [ $? -ne 0 ] ; then
        
        echo sourceanalyzer failed, exiting
        exit
        fi
        # ###########################################################################
        echo Uploading scan to SSC
        $CLIENT -url $SSCURL -authtoken $SSCTOKEN uploadFPR -file $FPR -application "$SSCAPPLICATION" -applicationVersion "$SSCVERSION"
        if [ $? -ne 0 ] ; then
        echo fortifyclient failed, exiting
        exit
        fi
        # ###########################################################################
        echo Finished             
        # ARGS  "-exclude" "PROJECTROOT0_MARKER/**/node_modules/**" 
        # ARGS  "-exclude" "PROJECTROOT0_MARKER/**/dist/**"
        # ARGS  "-exclude" "PROJECTROOT0_MARKER/src/test.ts"
        # ARGS  "-exclude" "PROJECTROOT0_MARKER/src/environments/environment.ts"
        # ARGS  "-exclude" "PROJECTROOT0_MARKER/**/*.spec.ts"
        # ARGS  "-exclude" "PROJECTROOT0_MARKER/**/*.mocks.ts"
        # ARGS "PROJECTROOT0_MARKER/src"
  workspaces:
    - description: The workspace consisting of nodejs project.
      name: source
